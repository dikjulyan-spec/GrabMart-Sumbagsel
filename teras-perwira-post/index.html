<script>

function esc(v){return String(v??'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}
function getParam(k){return new URLSearchParams(location.search).get(k)||''}
function splitParas(text){return String(text||'').split(/\n{2,}|\r\n{2,}/).map(x=>x.trim()).filter(Boolean).map(p=>'<p>'+esc(p)+'</p>').join('')}
function short(v,n){v=String(v||'');return v.length>n?v.slice(0,n-1)+'…':v}

async function init(){
  const id=getParam('id');
  const app=document.getElementById('app');
  try{
    const res=await fetch(API+'?sheet=teras_perwira');
    const data=await res.json();
    const item=Array.isArray(data)?data.find(x=>String(x.id||'')===String(id)):null;
    if(!item){app.innerHTML='<div class="wrap"><div class="empty"><div style="font-size:2.4rem;margin-bottom:10px">🔎</div>Artikel kegiatan tidak ditemukan.<div class="btn-row" style="justify-content:center"><a class="btn btn-primary" href="/teras-perwira-grabmerchant/">Kembali ke Teras PERWIRA</a></div></div></div>';return;}

    const link=String(item.link||'').trim();

    document.getElementById('ogTitle').setAttribute('content', title);
    document.getElementById('ogDesc').setAttribute('content', short(desc,150));
    if(foto) document.getElementById('ogImage').setAttribute('content', foto);
    document.getElementById('canonicalLink').setAttribute('href','https://mitrasumbagsel.com/teras-perwira-post/?id='+encodeURIComponent(id));
    const imgHtml=foto?'<div class="hero-img"><img src="'+esc(foto)+'" alt="'+esc(title)+'"></div>':'<div class="hero-img">🤝</div>';
    const external=/^https:\/\//i.test(link)?'<a class="source-link" href="'+esc(link)+'" target="_blank" rel="noopener">🔗 Lihat sumber / dokumentasi eksternal</a>':'';
